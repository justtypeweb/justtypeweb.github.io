<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Streaming</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      text-align: center;
    }

    .player-container {
      position: relative;
      width: 100%;
      max-width: 900px;
      margin: auto;
    }

    .player-container iframe {
      width: 100%;
      height: 500px;
      border: none;
    }

    @media (max-width: 600px) {
      .player-container iframe {
        height: 220px;
      }
    }
  </style>
</head>

<body>

  <h2>🎬 My Streaming Website</h2>

  <div class="player-container">
    <iframe 
      src="https://seekstreaming.com/embed/YOUR_VIDEO_ID?api_key=148f3832eadb4c4049cadfd9"
      allowfullscreen>
    </iframe>
  </div>

</body>
</html>
