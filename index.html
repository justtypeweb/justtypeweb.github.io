<!DOCTYPE html>
<html>
<head>
    <title>Seek Streaming Player</title>
</head>
<body style="background:black; color:white; text-align:center;">

<h2>🎬 My Streaming Website</h2>

<video id="player" controls width="90%"></video>

<script>
const API_KEY = "8c649b4dea9ca0bdcbe60cbf";

fetch("https://api.seekstreaming.com/videos", {
    headers: {
        "Authorization": "Bearer " + API_KEY
    }
})
.then(res => res.json())
.then(data => {
    // Example: first video
    const videoUrl = data.videos[0].url;
    document.getElementById("player").src = videoUrl;
});
</script>

</body>
</html>
