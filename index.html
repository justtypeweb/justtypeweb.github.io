<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Streaming</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      text-align: center;
      font-family: Arial, sans-serif;
    }

    .player-container {
      position: relative;
      width: 100%;
      max-width: 900px;
      margin: auto;
    }

    .player-container iframe {
      width: 100%;
      height: 500px;
      border: none;
    }

    .contact-btn {
      margin: 20px;
      padding: 12px 25px;
      background: #ff4c4c;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .contact-btn:hover {
      background: #ff1a1a;
    }

    @media (max-width: 600px) {
      .player-container iframe {
        height: 220px;
      }
    }
  </style>
</head>

<body>

  <h2>🎬 RENT STREAMING</h2>

  <div class="player-container">
    <iframe 
      src="https://streaming.seekplayer.me/#h6pim" width="100%" height="100%" frameborder="0" allowfullscreen>
 
    </iframe>
  </div>

  <!-- Contact Button -->
  <a href="https://docs.google.com/forms/d/e/1FAIpQLScvXN7s8PSEej5NL7FbwjQLk9Udgk-a18zcfbKSU0wqhLoxng/viewform?usp=dialog" target="_blank">
    <button class="contact-btn">📩 Contact Information</button>
  </a>

</body>
</html>
